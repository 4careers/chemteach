<div class="slide active" data-type="static">

    <div class="topics">Topics covered today:<br>3.3 Modern Periodic Law, Present Periodic Table</div>

</div>

<div class="slide" data-type="riddle" data-config='{"question": "Argon (atomic mass ~40) comes before Potassium (atomic mass ~39) in the modern periodic table, even though Argon&#39;s mass is slightly higher. How can a HEAVIER element be placed BEFORE a lighter one?", "hint": "The modern table is NOT ordered by mass.", "answer": "Because the table is ordered by ATOMIC NUMBER, not atomic mass", "explanation": "Argon has atomic number 18, Potassium has atomic number 19 \u2014 so Argon correctly comes first by atomic number, even though its atomic mass happens to be very slightly higher due to isotope abundance. This is exactly the kind of anomaly that mass-based ordering could not handle, and atomic-number-based ordering fixes perfectly."}'>
  <div class="component-container"></div>
</div>



<div class="slide" data-type="gamification" data-config='{"instruction": "Sort each statement as True for the Modern Periodic Table or False.", "items": ["Ordered by atomic number", "Ordered by atomic mass", "Has 18 groups and 7 periods", "Elements in the same group share similar properties"], "categories": ["True", "False"], "answers": {"Ordered by atomic number": "True", "Ordered by atomic mass": "False", "Has 18 groups and 7 periods": "True", "Elements in the same group share similar properties": "True"}}'>
  <div class="component-container"></div>
</div>

<div class="slide" data-type="infographic" data-config='{"title": "Visual Summary: Modern Periodic Law", "image": "summary_modern.jpg", "caption": "Ordered by Atomic Number (Z).", "explanation": "The Present Periodic Table has 18 vertical Groups and 7 horizontal Periods. Elements in the same group have similar properties due to their identical valence electron configuration."}'>

<script src="../../../progress.js?v=13"></script>
<script src="../../../components/infographic.js?v=13"></script>

<script src="../../../components/riddle.js?v=13"></script>
<script src="../../../components/mnemonic.js?v=13"></script>
<script src="../../../components/comic-strip.js?v=13"></script>
<script src="../../../components/animation.js?v=13"></script>
<script>
const SESSION_ID = 'ch03_w08_s05-06';
let currentSlide = 0;
const slides = document.querySelectorAll('.slide');

function goToSlide(n) {
  slides[currentSlide].classList.remove('active');
  currentSlide = Math.max(0, Math.min(n, slides.length - 1));
  slides[currentSlide].classList.add('active');
  document.getElementById('slide-counter').textContent = `Slide ${currentSlide + 1} of ${slides.length}`;
  document.getElementById('btn-prev').disabled = currentSlide === 0;
  document.getElementById('btn-next').disabled = currentSlide === slides.length - 1;
  ChemProgress.setLastSlide(SESSION_ID, currentSlide + 1);
  initCurrentSlide();
}

function initCurrentSlide() {
  const slide = slides[currentSlide];
  const type = slide.dataset.type;
  const container = slide.querySelector('.component-container');
  if (!container || container.dataset.init === 'true') return;
  container.dataset.init = 'true';
  const config = JSON.parse(slide.dataset.config || '{}');
  switch (type) {
    case 'story': Story.init(container, config); break;
    case 'infographic': Infographic.init(container, config); break;
    case 'moseley-sim': MoseleySim.init(container, config); break;
    case 'known-unknown': Scaffold.init(container, config); break;
    case 'experiment-sim': ParticleSim.init(container, config); break;
    case 'model-3d': Model3D.init(container, config); break;
    case 'analogy': Analogy.init(container, config); break;
    case 'visual-explain': VisualExplain.init(container, config); break;
    case 'interactive-pt': InteractivePT.init(container, config); break;
    case 'gamification': DragDrop.init(container, config); break;
    case 'riddle': Riddle.init(container, config); break;
    case 'mnemonic': Mnemonic.init(container, config); break;
    case 'comic-strip': ComicStrip.init(container, config); break;
    case 'animation': ChemAnimation.init(container, config); break;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToSlide(currentSlide + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goToSlide(currentSlide - 1);
  if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.();
});

document.getElementById('btn-prev').onclick = () => goToSlide(currentSlide - 1);
document.getElementById('btn-next').onclick = () => goToSlide(currentSlide + 1);
document.getElementById('btn-home').onclick = () => window.location.href = '../../../index.html';
document.getElementById('btn-complete').onclick = () => {
  ChemProgress.markComplete(SESSION_ID);
  const btn = document.getElementById('btn-complete');
  btn.textContent = '✓ COMPLETE';
  btn.classList.add('is-complete');
};
document.getElementById('btn-fullscreen').onclick = () => document.documentElement.requestFullscreen?.();

ChemProgress.setLastOpened(3, 8, '05-06');
const savedSlide = ChemProgress.getLastSlide(SESSION_ID);
goToSlide(savedSlide - 1);
if (ChemProgress.isComplete(SESSION_ID)) {
  const btn = document.getElementById('btn-complete');
  btn.textContent = '✓ COMPLETE';
  btn.classList.add('is-complete');
}
</script>
</body>
</html>
