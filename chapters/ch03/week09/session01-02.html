<script>
const SESSION_ID = 'ch03_w09_s01-02';
let currentSlide = 0;
const slides = document.querySelectorAll('.slide');

function goToSlide(n) {
  slides[currentSlide].classList.remove('active');
  currentSlide = Math.max(0, Math.min(n, slides.length - 1));
  slides[currentSlide].classList.add('active');
  document.getElementById('slide-counter').textContent = `Slide ${currentSlide + 1} of ${slides.length}`;
  document.getElementById('btn-prev').disabled = currentSlide === 0;
  document.getElementById('btn-next').disabled = currentSlide === slides.length - 1;
  ChemProgress.setLastSlide(SESSION_ID, currentSlide + 1);
  initCurrentSlide();
}

function initCurrentSlide() {
  const slide = slides[currentSlide];
  const type = slide.dataset.type;
  const container = slide.querySelector('.component-container');
  if (!container || container.dataset.init === 'true') return;
  container.dataset.init = 'true';
  const config = JSON.parse(slide.dataset.config || '{}');
  switch (type) {
    case 'story': Story.init(container, config); break;
    case 'infographic': Infographic.init(container, config); break;
    case 'accelerator-sim': AcceleratorSim.init(container, config); break;
    case 'known-unknown': Scaffold.init(container, config); break;
    case 'experiment-sim': ParticleSim.init(container, config); break;
    case 'model-3d': Model3D.init(container, config); break;
    case 'analogy': Analogy.init(container, config); break;
    case 'visual-explain': VisualExplain.init(container, config); break;
    case 'iupac-namer': IupacNamer.init(container, config); break;
    case 'gamification': DragDrop.init(container, config); break;
    case 'riddle': Riddle.init(container, config); break;
    case 'mnemonic': Mnemonic.init(container, config); break;
    case 'comic-strip': ComicStrip.init(container, config); break;
    case 'animation': ChemAnimation.init(container, config); break;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToSlide(currentSlide + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goToSlide(currentSlide - 1);
  if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.();
});

document.getElementById('btn-prev').onclick = () => goToSlide(currentSlide - 1);
document.getElementById('btn-next').onclick = () => goToSlide(currentSlide + 1);
document.getElementById('btn-home').onclick = () => window.location.href = '../../../index.html';
document.getElementById('btn-complete').onclick = () => {
  ChemProgress.markComplete(SESSION_ID);
  const btn = document.getElementById('btn-complete');
  btn.textContent = '✓ COMPLETE';
  btn.classList.add('is-complete');
};
document.getElementById('btn-fullscreen').onclick = () => document.documentElement.requestFullscreen?.();

ChemProgress.setLastOpened(3, 9, '01-02');
const savedSlide = ChemProgress.getLastSlide(SESSION_ID);
goToSlide(savedSlide - 1);
if (ChemProgress.isComplete(SESSION_ID)) {
  const btn = document.getElementById('btn-complete');
  btn.textContent = '✓ COMPLETE';
  btn.classList.add('is-complete');
}
</script>
